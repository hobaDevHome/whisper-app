<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صوت ← نص</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #12121a;
        --surface2: #1a1a28;
        --accent: #7c6aff;
        --accent2: #ff6a9e;
        --accent-glow: rgba(124, 106, 255, 0.3);
        --text: #f0eeff;
        --muted: #8b88aa;
        --border: rgba(124, 106, 255, 0.2);
        --red: #ff4a6e;
        --green: #4aff9e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Cairo", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(124, 106, 255, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 680px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .header {
        text-align: center;
      }
      .header h1 {
        font-size: 2rem;
        font-weight: 900;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
      }
      .header p {
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 300;
      }

      .recorder-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 36px 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .visualizer-wrap {
        width: 100%;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        opacity: 0.4;
        transition: opacity 0.3s;
      }
      .visualizer-wrap.active {
        opacity: 1;
      }
      .bar {
        width: 4px;
        height: 8px;
        background: linear-gradient(180deg, var(--accent), var(--accent2));
        border-radius: 4px;
        transition: height 0.05s ease;
      }

      .record-btn {
        position: relative;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .record-btn:hover {
        transform: scale(1.05);
      }
      .record-btn.recording {
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 20px var(--accent-glow);
        }
        50% {
          box-shadow: 0 0 50px rgba(124, 106, 255, 0.6);
        }
      }
      .record-icon {
        width: 36px;
        height: 36px;
        background: white;
        border-radius: 50%;
        transition:
          border-radius 0.3s,
          width 0.3s,
          height 0.3s;
      }
      .record-btn.recording .record-icon {
        border-radius: 8px;
        width: 30px;
        height: 30px;
      }

      .status-text {
        font-size: 1rem;
        font-weight: 600;
        color: var(--muted);
        min-height: 1.4em;
        text-align: center;
        transition: color 0.3s;
      }
      .status-text.recording {
        color: var(--accent);
      }
      .status-text.loading {
        color: var(--accent2);
      }
      .status-text.done {
        color: var(--green);
      }
      .status-text.error {
        color: var(--red);
      }

      .timer {
        font-size: 0.85rem;
        color: var(--muted);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        display: none;
      }
      .timer.visible {
        display: block;
      }

      .upload-section {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 0.8rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .upload-btn {
        background: var(--surface2);
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 14px;
        color: var(--muted);
        font-family: "Cairo", sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        width: 100%;
      }
      .upload-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      #fileInput {
        display: none;
      }

      .result-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        flex-direction: column;
        gap: 14px;
        display: none;
      }
      .result-card.visible {
        display: flex;
      }
      .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .result-label {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .copy-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 14px;
        color: var(--muted);
        font-family: "Cairo", sans-serif;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .result-text {
        font-size: 1.1rem;
        font-weight: 400;
        line-height: 1.8;
        color: var(--text);
        min-height: 60px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎙️ صوت ← نص</h1>
        <p>سجّل أو ارفع ملف صوتي وهو يحوّله لنص بالعربي</p>
      </div>

      <div class="recorder-card">
        <div class="visualizer-wrap" id="visualizer">
          <!-- 20 bars للـ visualizer -->
          <div class="bar" id="b0"></div>
          <div class="bar" id="b1"></div>
          <div class="bar" id="b2"></div>
          <div class="bar" id="b3"></div>
          <div class="bar" id="b4"></div>
          <div class="bar" id="b5"></div>
          <div class="bar" id="b6"></div>
          <div class="bar" id="b7"></div>
          <div class="bar" id="b8"></div>
          <div class="bar" id="b9"></div>
          <div class="bar" id="b10"></div>
          <div class="bar" id="b11"></div>
          <div class="bar" id="b12"></div>
          <div class="bar" id="b13"></div>
          <div class="bar" id="b14"></div>
          <div class="bar" id="b15"></div>
          <div class="bar" id="b16"></div>
          <div class="bar" id="b17"></div>
          <div class="bar" id="b18"></div>
          <div class="bar" id="b19"></div>
        </div>

        <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
          <div class="record-icon" id="recordIcon"></div>
        </button>
        <div class="timer" id="timer">00:00</div>

        <div class="status-text" id="status">اضغط عشان تسجّل</div>

        <div class="upload-section">
          <div class="divider">أو</div>
          <input
            type="file"
            id="fileInput"
            accept="audio/*,video/*"
            onchange="handleFile(this)"
          />
          <button
            class="upload-btn"
            onclick="document.getElementById('fileInput').click()"
          >
            📁 ارفع ملف صوتي
          </button>
        </div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-header">
          <span class="result-label">النص</span>
          <button class="copy-btn" onclick="copyText()">📋 نسخ</button>
        </div>
        <div class="result-text" id="resultText"></div>
      </div>
    </div>

    <script>
      // ======================================================
      // غيّري السطر ده لو عندك domain مخصوص،
      // لو لأ اتركيه فاضي وهو هيبعت للـ /api/transcribe تلقائي
      // ======================================================
      const API_URL = "/api/transcribe";

      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;
      let timerInterval = null;
      let seconds = 0;
      let analyser = null;
      let animFrame = null;
      let audioCtx = null;

      function setStatus(msg, type = "") {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status-text" + (type ? " " + type : "");
      }

      function updateTimer() {
        seconds++;
        const m = String(Math.floor(seconds / 60)).padStart(2, "0");
        const s = String(seconds % 60).padStart(2, "0");
        document.getElementById("timer").textContent = `${m}:${s}`;
      }

      function startVisualizer(stream) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        const dataArr = new Uint8Array(analyser.frequencyBinCount);
        document.getElementById("visualizer").classList.add("active");

        function draw() {
          analyser.getByteFrequencyData(dataArr);
          for (let i = 0; i < 20; i++) {
            const val = dataArr[i] || 0;
            const h = Math.max(6, (val / 255) * 70);
            document.getElementById("b" + i).style.height = h + "px";
          }
          animFrame = requestAnimationFrame(draw);
        }
        draw();
      }

      function stopVisualizer() {
        if (animFrame) cancelAnimationFrame(animFrame);
        if (audioCtx) audioCtx.close();
        document.getElementById("visualizer").classList.remove("active");
        for (let i = 0; i < 20; i++) {
          document.getElementById("b" + i).style.height = "8px";
        }
      }

      async function toggleRecord() {
        if (!isRecording) await startRecording();
        else stopRecording();
      }

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: "audio/webm" });
            transcribe(blob, "recording.webm");
            stream.getTracks().forEach((t) => t.stop());
          };
          mediaRecorder.start();
          isRecording = true;

          document.getElementById("recordBtn").classList.add("recording");
          setStatus("🔴 بيسجّل...", "recording");
          seconds = 0;
          document.getElementById("timer").classList.add("visible");
          timerInterval = setInterval(updateTimer, 1000);
          startVisualizer(stream);
        } catch (e) {
          setStatus("❌ مش قادر يوصل للميكروفون", "error");
        }
      }

      function stopRecording() {
        if (mediaRecorder) mediaRecorder.stop();
        isRecording = false;
        document.getElementById("recordBtn").classList.remove("recording");
        clearInterval(timerInterval);
        document.getElementById("timer").classList.remove("visible");
        stopVisualizer();
        setStatus("⏳ بيحوّل...", "loading");
      }

      function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        setStatus("⏳ بيحوّل...", "loading");
        transcribe(file, file.name);
      }

      async function transcribe(audioBlob, filename) {
        const formData = new FormData();
        formData.append("file", audioBlob, filename);
        formData.append("model", "whisper-1");
        formData.append("language", "ar");
        formData.append(
          "prompt",
          "اللهجة المصرية العامية، كلام بالعربي المصري اليومي",
        );

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "خطأ من السيرفر");
          }

          const text = data.text?.trim();
          if (text) {
            document.getElementById("resultText").textContent = text;
            document.getElementById("resultCard").classList.add("visible");
            setStatus("✅ خلص!", "done");
          } else {
            setStatus("⚠️ ملقتش صوت واضح", "error");
          }
        } catch (e) {
          setStatus("❌ " + e.message, "error");
        }
      }

      function copyText() {
        const t = document.getElementById("resultText").textContent;
        navigator.clipboard.writeText(t).then(() => {
          const btn = document.querySelector(".copy-btn");
          btn.textContent = "✅ اتنسخ";
          setTimeout(() => (btn.textContent = "📋 نسخ"), 2000);
        });
      }
    </script>
  </body>
</html>
